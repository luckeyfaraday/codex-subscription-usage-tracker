<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athena Usage Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <header class="masthead">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 40 40" aria-hidden="true">
          <circle cx="20" cy="20" r="18" />
          <path d="M20 2 A18 18 0 0 1 38 20 L20 20 Z" class="brand-sector" />
          <circle cx="20" cy="20" r="2.5" class="brand-pin" />
        </svg>
        <div class="brand-text">
          <span class="brand-eyebrow">N° 01 · LOCAL TELEMETRY</span>
          <h1>
            <span>Almanac</span>
            <em>of limits</em>
          </h1>
        </div>
      </div>

      <dl class="vitals">
        <div>
          <dt>Accounts</dt>
          <dd id="vitalAccounts">—</dd>
        </div>
        <div>
          <dt>Status</dt>
          <dd id="vitalStatus">Idle</dd>
        </div>
        <div>
          <dt>Local time</dt>
          <dd id="vitalClock" class="mono">--:--:--</dd>
        </div>
      </dl>

      <div class="masthead-actions">
        <a class="btn ghost" href="/widget.html">
          <svg viewBox="0 0 24 24" aria-hidden="true" stroke-width="1.5" class="arrow arrow-left">
            <path d="M19 12H5M11 6l-6 6 6 6" />
          </svg>
          <span>Widget</span>
        </a>
        <button class="btn ghost" id="privacyToggle" type="button" aria-pressed="false" title="Hide emails (P)">
          <span class="btn-icon" data-icon="eye"></span>
          <span class="privacy-label">Privacy</span>
        </button>
        <button class="btn ghost" id="notificationToggle" type="button" aria-pressed="false" title="Mobile alerts">
          <span class="btn-icon" data-icon="bell"></span>
          <span class="notification-label">Alerts</span>
        </button>
        <button class="btn ghost" id="refreshUsage" type="button">
          <span class="btn-icon" data-icon="refresh"></span>
          <span>Refresh</span>
        </button>
        <button class="btn solid" id="openAddDialog" type="button">
          <span class="btn-icon" data-icon="plus"></span>
          <span>New account</span>
        </button>
      </div>
    </header>

    <main class="stage">
      <section class="focus" id="focusPanel" aria-live="polite"></section>

      <section class="ledger">
        <header class="ledger-head">
          <div>
            <span class="kicker">II</span>
            <h2>Ledger of accounts</h2>
          </div>
          <span class="ledger-meta" id="ledgerMeta">Awaiting first read</span>
        </header>
        <div class="ledger-grid" id="accountList"></div>
      </section>

      <footer class="colophon">
        <span>Almanac &middot; vanilla node + a stubborn refusal of generic ui</span>
        <span id="footerStamp" class="mono">localhost · :8080</span>
      </footer>
    </main>

    <dialog id="accountDialog" class="modal">
      <form method="dialog" id="accountForm" class="modal-inner">
        <header class="modal-head">
          <span class="kicker">New entry</span>
          <h2>Register a subscription</h2>
          <button class="modal-close" type="button" id="closeDialog" aria-label="Close">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </header>

        <div class="provider-switch" role="radiogroup" aria-label="Provider">
          <label>
            <input type="radio" name="provider" value="codex" checked />
            <span>Codex · ChatGPT</span>
          </label>
          <label>
            <input type="radio" name="provider" value="claude" />
            <span>Claude Code</span>
          </label>
          <label>
            <input type="radio" name="provider" value="openrouter" />
            <span>OpenRouter</span>
          </label>
        </div>

        <label class="field">
          <span class="field-label">Display name</span>
          <input id="accountName" required placeholder="Backup Pro, Personal Plus…" />
        </label>

        <label class="field" id="codexHomeField">
          <span class="field-label">CODEX_HOME</span>
          <input id="codexHome" placeholder="~/.codex-accounts/account2" />
          <span class="field-hint">Use a dedicated path per subscription. If you enter <code>~/.codex</code>, the current login is imported into a dedicated tracked home.</span>
        </label>

        <label class="field" id="claudeHomeField" hidden>
          <span class="field-label">CLAUDE config home</span>
          <input id="claudeHome" placeholder="~/.claude" />
          <span class="field-hint">Defaults to <code>~/.claude</code> if left blank.</span>
        </label>

        <label class="field" id="openrouterKeyEnvField" hidden>
          <span class="field-label">API key env var</span>
          <input id="openrouterKeyEnv" placeholder="OPENROUTER_API_KEY" />
          <span class="field-hint">Name of the environment variable holding your OpenRouter API key. The key must start with <code>sk-or-</code> and be stored in an env var (not entered directly).</span>
        </label>

        <label class="field" id="openrouterUsageLogField" hidden>
          <span class="field-label">Usage log <em>optional</em></span>
          <input id="openrouterUsageLog" placeholder="~/openrouter-usage.jsonl" />
          <span class="field-hint">Local JSON or JSONL generation metadata. Keep prompts out; model, token, cost, and timestamp fields are enough.</span>
        </label>

        <label class="field">
          <span class="field-label">Expected email <em>optional</em></span>
          <input id="expectedEmail" type="email" placeholder="you@example.com" />
          <span class="field-hint">Used to flag a directory logged into the wrong identity.</span>
        </label>

        <footer class="modal-foot">
          <button class="btn ghost" type="button" id="cancelDialog">Cancel</button>
          <button class="btn solid" value="default">Register account</button>
        </footer>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
